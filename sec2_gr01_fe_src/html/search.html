<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">
    <title>Search – ARAIMAIRU Solar Solution</title>
    <style>
        /* ── Unavailable product card ── */
        .product-card.unavailable .product-img-box img {
            opacity: 0.45;
        }
        .product-img-wrapper {
            position: relative;
        }
        .unavailable-badge {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(80, 40, 20, 0.72);
            color: #fff;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 20px;
            pointer-events: none;
            white-space: nowrap;
        }
        .product-card.unavailable .unavailable-badge {
            display: block;
        }
        .product-card.unavailable .product-info {
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <header><h1>ARAIMAIRU Solar Solution</h1></header>

    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/search" class="active">Search</a></li>
            <li><a href="/team">Our Team</a></li>
            <li><a href="/login">Admin Login</a></li>
        </ul>
    </nav>

    <main>
        <div class="search-section">
            <div class="search-bar">
                <button class="search-dropdown-btn" onclick="toggleDropdown()" title="Advanced Search">&#9660; </button>
                <input type="text" id="searchInput" placeholder="Product Name*" oninput="debounceSearch()">
                <button class="search-icon-btn" onclick="fetchProducts()">&#128269;</button>
            </div>

            <div class="search-dropdown" id="searchDropdown">
                <div class="dropdown-row">
                    <span class="dropdown-label">Product Type:</span>
                    <label><input type="checkbox" value="Services" onchange="fetchProducts()"> Services</label>
                    <label><input type="checkbox" value="Rooftop" onchange="fetchProducts()"> Rooftop</label>
                    <label><input type="checkbox" value="Floating" onchange="fetchProducts()"> Floating</label>
                    <label><input type="checkbox" value="Ground" onchange="fetchProducts()"> Ground</label>
                </div>
                <div class="dropdown-row">
                    <span class="dropdown-label">Price Range:</span>
                    <input type="number" id="priceMin" placeholder="Min" oninput="debounceSearch()">
                    <span> - </span>
                    <input type="number" id="priceMax" placeholder="Max" oninput="debounceSearch()">
                </div>
            </div>

            <div class="filter-tags" id="filterTags"></div>
        </div>

        <div class="product-grid" id="productGrid">
            <p style="text-align:center; color:#485935;">Loading products...</p>
        </div>
        <p id="noResults" style="display:none; text-align:center; color:#485935; margin-top:40px;">No products found.</p>
    </main>

    <footer>
        <h3>Contact us</h3>
        <section class="footer-content">
            <p>Email: ARAIMAIRUSolarSolution@gmail.com</p>
            <p>Tel: 099-999-9999</p>
        </section>
    </footer>

    <script>
        const API_BASE = 'http://localhost:3000';
        let debounceTimer = null;

        function toggleDropdown() {
            const dd = document.getElementById('searchDropdown');
            dd.style.display = dd.style.display === 'block' ? 'none' : 'block';
        }

        function debounceSearch() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(fetchProducts, 400);
        }

        async function fetchProducts() {
            const name     = document.getElementById('searchInput').value.trim();
            const minPrice = document.getElementById('priceMin').value;
            const maxPrice = document.getElementById('priceMax').value;
            const types    = Array.from(document.querySelectorAll('.search-dropdown input[type=checkbox]:checked')).map(c => c.value);

            const params = new URLSearchParams();
            if (name)         params.append('name', name);
            if (types.length) params.append('type', types.join(','));
            if (minPrice)     params.append('minPrice', minPrice);
            if (maxPrice)     params.append('maxPrice', maxPrice);

            const grid = document.getElementById('productGrid');
            grid.innerHTML = '<p style="text-align:center; color:#485935;">Loading...</p>';

            try {
                const res  = await fetch(`${API_BASE}/products?${params.toString()}`);
                const data = await res.json();
                renderProducts(data.data || []);
                renderTags(name, types, minPrice, maxPrice);
            } catch (err) {
                grid.innerHTML = '<p style="text-align:center; color:red;">Failed to load products. Is the backend running?</p>';
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            const noResults = document.getElementById('noResults');

            if (!products.length) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            noResults.style.display = 'none';

            grid.innerHTML = products.map(p => {
                const available = p.status == 1;
                return `
                <a href="/product-details?id=${p.ProductID}" class="product-card${available ? '' : ' unavailable'}">
                    <div class="product-img-wrapper product-img-box">
                        <img src="${p.image_url || '/images/profile-pic.svg'}" alt="${p.name}">
                        <span class="unavailable-badge">Unavailable</span>
                    </div>
                    <div class="product-info">
                        <p><strong>Product:</strong> ${p.name}</p>
                        <p><strong>Type:</strong> ${p.type}</p>
                        <p><strong>Price:</strong> ฿${Number(p.price).toLocaleString()}</p>
                    </div>
                </a>`;
            }).join('');
        }

        function renderTags(name, types, minPrice, maxPrice) {
            const container = document.getElementById('filterTags');
            container.innerHTML = '';
            if (name) container.appendChild(makeTag('Product Name', name, () => { document.getElementById('searchInput').value = ''; fetchProducts(); }));
            types.forEach(t => container.appendChild(makeTag('Product Type', t, () => {
                document.querySelectorAll('.search-dropdown input[type=checkbox]').forEach(cb => { if (cb.value === t) cb.checked = false; });
                fetchProducts();
            })));
            if (minPrice || maxPrice) {
                container.appendChild(makeTag('Price Range', `฿${minPrice || '0'} - ฿${maxPrice || '∞'}`, () => {
                    document.getElementById('priceMin').value = '';
                    document.getElementById('priceMax').value = '';
                    fetchProducts();
                }));
            }
        }

        function makeTag(category, value, onRemove) {
            const tag = document.createElement('div');
            tag.className = 'filter-tag';
            tag.innerHTML = `<span class="tag-label">${category}</span><span class="tag-value">${value}</span><button class="tag-remove" title="Remove">&#10005;</button>`;
            tag.querySelector('.tag-remove').addEventListener('click', onRemove);
            return tag;
        }

        fetchProducts();
    </script>
</body>
</html>
