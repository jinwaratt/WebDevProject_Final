<!doctype html>
<!--
    FILE: product-management.html
    PURPOSE: Admin dashboard for managing solar products with search and filtering capabilities
    FEATURES:
      - Product search by name with real-time filtering
      - Advanced filtering by product type (Rooftop, Floating, Ground, Services)
      - Price range filtering (min/max)
      - Product grid display with edit links
      - Visual indicators for unavailable products
      - Add Product button for creating new products
      - Session-based authentication check
      - Filter tag display with removal capabilities
      - Debounced search for performance optimization
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles.css" />
    <title>Product Management</title>
    <style>
      /* ── Unavailable Product Card Styling (Admin View) ── */
      /* Faded image and info for products that are currently unavailable */
      .product-card.unavailable .product-img-box img {
        opacity: 0.45;
      }
      .product-img-wrapper {
        position: relative;
      }
      /* ── Unavailable Product Badge ── */
      /* Centered badge overlay displayed on unavailable product images */
      .unavailable-badge {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(80, 40, 20, 0.72);
        color: #fff;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 5px 14px;
        border-radius: 20px;
        pointer-events: none;
        white-space: nowrap;
      }
      .product-card.unavailable .unavailable-badge {
        display: block;
      }
      .product-card.unavailable .product-info {
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <header><h1>ARAIMAIRU Solar Solution</h1></header>

    <!-- Navigation: Admin menu with search highlighted and logout option -->
    <nav>
      <ul>
        <li><a href="#" class="active">Search</a></li>
        <li><a href="#" onclick="handleLogout()">Admin Logout</a></li>
      </ul>
    </nav>

    <main>
      <!-- Search and Filter Section -->
      <div class="search-section">
        <!-- Search Bar with Dropdown and Add Product Button -->
        <div class="admin-search-row">
          <!-- Search Bar: Product name search with dropdown toggle and search button -->
          <div class="search-bar">
            <button class="search-dropdown-btn" onclick="toggleDropdown()">
              &#9660;
            </button>
            <input
              type="text"
              id="searchInput"
              placeholder="Product Name*"
              oninput="debounceSearch()"
            />
            <button class="search-icon-btn" onclick="fetchProducts()">
              &#128269;
            </button>
          </div>
          <!-- Add Product Button: Links to product creation page -->
          <a href="/add-product" class="btn-add-product">Add Product +</a>
        </div>

        <!-- Advanced Filters Dropdown: Type and price range filters -->
        <div class="search-dropdown" id="searchDropdown">
          <!-- Product Type Filter: Checkbox selection for multiple types -->
          <div class="dropdown-row">
            <span class="dropdown-label">Product Type:</span>
            <label
              ><input
                type="checkbox"
                value="Services"
                onchange="fetchProducts()"
              />
              Services</label
            >
            <label
              ><input
                type="checkbox"
                value="Rooftop"
                onchange="fetchProducts()"
              />
              Rooftop</label
            >
            <label
              ><input
                type="checkbox"
                value="Floating"
                onchange="fetchProducts()"
              />
              Floating</label
            >
            <label
              ><input
                type="checkbox"
                value="Ground"
                onchange="fetchProducts()"
              />
              Ground</label
            >
          </div>
          <!-- Price Range Filter: Min and max price inputs -->
          <div class="dropdown-row">
            <span class="dropdown-label">Price Range:</span>
            <input
              type="number"
              id="priceMin"
              placeholder="Min"
              oninput="debounceSearch()"
            />
            <span> - </span>
            <input
              type="number"
              id="priceMax"
              placeholder="Max"
              oninput="debounceSearch()"
            />
          </div>
        </div>

        <!-- Active Filter Tags: Visual display of applied filters with removal option -->
        <div class="filter-tags" id="filterTags"></div>
      </div>

      <!-- Product Grid: Displays search results in card layout -->
      <div class="product-grid" id="productGrid">
        <p style="text-align: center; color: #485935">Loading products...</p>
      </div>
      <!-- No Results Message: Shown when search returns no products -->
      <p
        id="noResults"
        style="
          display: none;
          text-align: center;
          color: #485935;
          margin-top: 40px;
        "
      >
        No products found.
      </p>
    </main>

    <!-- Footer: Contact information -->
    <footer>
      <h3>Contact us</h3>
      <section class="footer-content">
        <p>Email: ARAIMAIRUSolarSolution@gmail.com</p>
        <p>Tel: 099-999-9999</p>
      </section>
    </footer>

    <!-- Script: Product management, search, filtering, and data rendering -->
    <script>
      const API_BASE =
        "https://six82-projectphase2-68-section2-group01.onrender.com";
      let debounceTimer = null;

      // ========== Authentication Guard ==========
      // Verify user is logged in; redirect to login page if not
      const user = JSON.parse(sessionStorage.getItem("user") || "null");
      if (!user) window.location.href = "/login";

      // ========== Logout Handler ==========
      // Clears session storage and redirects to login page
      function handleLogout() {
        sessionStorage.removeItem("user");
        window.location.href = "/login";
      }

      // ========== Toggle Filter Dropdown ==========
      // PURPOSE: Show/hide advanced filter options dropdown
      function toggleDropdown() {
        const dd = document.getElementById("searchDropdown");
        dd.style.display = dd.style.display === "block" ? "none" : "block";
      }

      // ========== Debounced Search ==========
      // PURPOSE: Delay search execution to prevent excessive API calls during rapid typing
      // TIMING: 400ms delay before executing fetchProducts()
      function debounceSearch() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(fetchProducts, 400);
      }

      // ========== Fetch Products with Filters ==========
      // PURPOSE: Retrieve filtered products from backend API based on search criteria
      // FILTERS:
      //   - Product name (text search)
      //   - Product type (multiple selection)
      //   - Price range (min/max)
      // PROCESS:
      //   1. Collect all filter values from form inputs
      //   2. Build query parameters from non-empty filters
      //   3. Send GET request to /products endpoint with parameters
      //   4. Render product grid with results
      //   5. Display filter tags for active filters
      async function fetchProducts() {
        // Retrieve search and filter values
        const name = document.getElementById("searchInput").value.trim();
        const minPrice = document.getElementById("priceMin").value;
        const maxPrice = document.getElementById("priceMax").value;
        const types = Array.from(
          document.querySelectorAll(
            ".search-dropdown input[type=checkbox]:checked",
          ),
        ).map((c) => c.value);

        // Build query parameters from filter values
        const params = new URLSearchParams();
        if (name) params.append("name", name);
        if (types.length) params.append("type", types.join(","));
        if (minPrice) params.append("minPrice", minPrice);
        if (maxPrice) params.append("maxPrice", maxPrice);

        // Show loading state
        const grid = document.getElementById("productGrid");
        grid.innerHTML =
          '<p style="text-align:center; color:#485935;">Loading...</p>';

        try {
          // Send GET request with filter parameters
          const res = await fetch(`${API_BASE}/products?${params.toString()}`);
          const data = await res.json();
          renderProducts(data.data || []);
          renderTags(name, types, minPrice, maxPrice);
        } catch (err) {
          grid.innerHTML =
            '<p style="text-align:center; color:red;">Failed to load products. Is the backend running?</p>';
        }
      }

      // ========== Render Product Grid ==========
      // PURPOSE: Display products in card grid format with edit links
      // PARAMS: products - array of product objects from API
      // FEATURES:
      //   - Card layout with product image, name, type, price
      //   - Edit link for each product
      //   - Visual styling for unavailable products (faded image + badge)
      //   - No results message when products array is empty
      function renderProducts(products) {
        const grid = document.getElementById("productGrid");
        const noResults = document.getElementById("noResults");

        // Handle empty results
        if (!products.length) {
          grid.innerHTML = "";
          noResults.style.display = "block";
          return;
        }
        noResults.style.display = "none";

        // Build product cards HTML
        grid.innerHTML = products
          .map((p) => {
            const available = p.status == 1;
            return `
                <!-- Product Card: Clickable admin card with edit link -->
                <div class="product-card admin-card${available ? "" : " unavailable"}">
                    <!-- Edit Icon: Links to product edit page -->
                    <div class="admin-edit-icon">
                        <a href="/edit-product?id=${p.ProductID}" title="Edit">&#9998;</a>
                    </div>
                    <!-- Product Image: Faded with "Unavailable" badge if out of stock -->
                    <div class="product-img-wrapper product-img-box">
                        <img src="${p.image_url || "/images/profile-pic.svg"}" alt="${p.name}">
                        <span class="unavailable-badge">Unavailable</span>
                    </div>
                    <!-- Product Information: Name, type, and price -->
                    <div class="product-info">
                        <p><strong>Product:</strong> ${p.name}</p>
                        <p><strong>Type:</strong> ${p.type}</p>
                        <p><strong>Price:</strong> ฿${Number(p.price).toLocaleString()}</p>
                    </div>
                </div>`;
          })
          .join("");
      }

      // ========== Render Active Filter Tags ==========
      // PURPOSE: Display visual tags for active filters with removal capability
      // PARAMS:
      //   - name: Product name search filter
      //   - types: Selected product type filters
      //   - minPrice: Minimum price filter
      //   - maxPrice: Maximum price filter
      function renderTags(name, types, minPrice, maxPrice) {
        const container = document.getElementById("filterTags");
        container.innerHTML = "";

        // Add product name tag
        if (name)
          container.appendChild(
            makeTag("Product Name", name, () => {
              document.getElementById("searchInput").value = "";
              fetchProducts();
            }),
          );

        // Add product type tags
        types.forEach((t) =>
          container.appendChild(
            makeTag("Product Type", t, () => {
              document
                .querySelectorAll(".search-dropdown input[type=checkbox]")
                .forEach((cb) => {
                  if (cb.value === t) cb.checked = false;
                });
              fetchProducts();
            }),
          ),
        );

        // Add price range tag
        if (minPrice || maxPrice) {
          container.appendChild(
            makeTag(
              "Price Range",
              `฿${minPrice || "0"} - ฿${maxPrice || "∞"}`,
              () => {
                document.getElementById("priceMin").value = "";
                document.getElementById("priceMax").value = "";
                fetchProducts();
              },
            ),
          );
        }
      }

      // ========== Create Filter Tag Element ==========
      // PURPOSE: Build a removable filter tag with category, value, and close button
      // PARAMS:
      //   - category: Filter category label (e.g., "Product Type", "Price Range")
      //   - value: Filter value to display
      //   - onRemove: Callback function executed when tag remove button is clicked
      // RETURNS: DOM element representing the filter tag
      function makeTag(category, value, onRemove) {
        const tag = document.createElement("div");
        tag.className = "filter-tag";
        tag.innerHTML = `<span class="tag-label">${category}</span><span class="tag-value">${value}</span><button class="tag-remove" title="Remove">&#10005;</button>`;
        tag.querySelector(".tag-remove").addEventListener("click", onRemove);
        return tag;
      }

      // ========== Initialization ==========
      // Load all products when page loads
      fetchProducts();
    </script>
  </body>
</html>
