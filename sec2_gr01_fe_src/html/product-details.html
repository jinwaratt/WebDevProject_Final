<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">
    <title>Product Details</title>
</head>
<body>
    <header><h1>ARAIMAIRU Solar Solution</h1></header>

    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/search" class="active">Search</a></li>
            <li><a href="/team">Our Team</a></li>
            <li><a href="/login">Admin Login</a></li>
        </ul>
    </nav>

    <main>
        <div class="details-wrapper" id="detailsWrapper">
            <p style="text-align:center; color:#485935;">Loading product...</p>
        </div>
    </main>

    <footer>
        <h3>Contact us</h3>
        <section class="footer-content">
            <p>Email: ARAIMAIRUSolarSolution@gmail.com</p>
            <p>Tel: 099-999-9999</p>
        </section>
    </footer>

    <script>
        const API_BASE = 'http://localhost:3000';

        async function loadProduct() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const wrapper = document.getElementById('detailsWrapper');

            if (!id) {
                wrapper.innerHTML = '<p style="text-align:center; color:red;">No product ID provided.</p>';
                return;
            }

            try {
                const res  = await fetch(`${API_BASE}/products/${id}`);
                const data = await res.json();

                if (!data.success) {
                    wrapper.innerHTML = `<p style="text-align:center; color:red;">${data.message}</p>`;
                    return;
                }

                const p = data.data;
                wrapper.innerHTML = `
                    <div class="details-img-box">
                        <img src="${p.image_url || '/images/profile-pic.svg'}" alt="${p.name}">
                    </div>
                    <div class="details-info">
                        <div class="details-fields">
                            <div class="detail-row">
                                <span class="detail-label">Title :</span>
                                <span class="detail-value">${p.name}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Type :</span>
                                <span class="detail-value">${p.type}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Product Detail :</span>
                                <span class="detail-value">${p.description || '-'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Price :</span>
                                <span class="detail-value">฿${Number(p.price).toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="details-actions">
                            <button class="btn-back" onclick="history.back()">Back</button>
                        </div>
                    </div>
                `;
            } catch (err) {
                wrapper.innerHTML = '<p style="text-align:center; color:red;">Failed to load product. Is the backend running?</p>';
            }
        }

        loadProduct();
    </script>
</body>
</html>
