<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">
    <title>Admin Login</title>
</head>
<body>
    <header><h1>ARAIMAIRU Solar Solution</h1></header>

    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/search">Search</a></li>
            <li><a href="/team">Our Team</a></li>
            <li><a href="/login" class="active">Admin Login</a></li>
        </ul>
    </nav>

    <main>
        <div class="login-wrapper">
            <div class="login-card">
                <h2>Login</h2>
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username">
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password">
                </div>
                <p id="errorMsg" style="color:red; display:none; margin-top:8px;"></p>
                <div class="login-buttons">
                    <button type="button" class="btn-clear" onclick="clearForm()">Clear</button>
                    <button type="button" class="btn-login" onclick="handleLogin()">Login</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <h3>Contact us</h3>
        <section class="footer-content">
            <p>Email: ARAIMAIRUSolarSolution@gmail.com</p>
            <p>Tel: 099-999-9999</p>
        </section>
    </footer>

    <script>
        const API_BASE = 'http://localhost:3000';

        function clearForm() {
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('errorMsg').style.display = 'none';
        }

        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (!username || !password) {
                errorMsg.textContent = 'Please enter username and password.';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    sessionStorage.setItem('user', JSON.stringify(data.data));
                    window.location.href = '/product-management';
                } else {
                    errorMsg.textContent = data.message || 'Login failed.';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Cannot connect to server. Please try again.';
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
