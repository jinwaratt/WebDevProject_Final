<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">
    <title>Add Product</title>
</head>
<body>
    <header><h1>ARAIMAIRU Solar Solution</h1></header>

    <nav>
        <ul>
            <li><a href="/product-management">Search</a></li>
            <li><a href="#" onclick="handleLogout()">Admin Logout</a></li>
        </ul>
    </nav>

    <main>
        <div class="admin-form-wrapper">
            <h2 class="admin-form-title">Add Product</h2>

            <div class="admin-form-grid">
                <!-- Left: image upload + status + product ID -->
                <div class="admin-form-left">
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" name="status" class="admin-select">
                            <option value="1">Available</option>
                            <option value="0">Unavailable</option>
                        </select>
                    </div>

                    <div class="img-upload-box" onclick="document.getElementById('imgInput').click()">
                        <span class="upload-plus" id="uploadPlus">+</span>
                        <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="previewImage(event)">
                        <img id="imgPreview" src="" alt="" style="display:none; width:100%; height:100%; object-fit:cover; border-radius:6px;">
                    </div>

                    <div class="form-group" style="margin-top: 12px;">
                        <label for="productId">ProductID</label>
                        <input type="text" id="productId" name="productId" placeholder="e.g. PRD00021">
                    </div>
                </div>

                <!-- Right: title, price, type, description -->
                <div class="admin-form-right">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" placeholder="Product name">
                    </div>
                    <div class="form-group">
                        <label for="price">Price</label>
                        <input type="number" id="price" name="price" placeholder="e.g. 8500">
                    </div>
                    <div class="form-group">
                        <label for="type">Type</label>
                        <select id="type" name="type" class="admin-select">
                            <option value="">-- Select Type --</option>
                            <option value="Rooftop">Rooftop</option>
                            <option value="Floating">Floating</option>
                            <option value="Ground">Ground</option>
                            <option value="Services">Services</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" rows="4" placeholder="Product description..."></textarea>
                    </div>

                    <p id="statusMsg" style="display:none; margin-top:8px;"></p>

                    <div class="admin-form-actions">
                        <button type="button" class="btn-add-submit" onclick="submitProduct()">Add Product +</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <h3>Contact us</h3>
        <section class="footer-content">
            <p>Email: ARAIMAIRUSolarSolution@gmail.com</p>
            <p>Tel: 099-999-9999</p>
        </section>
    </footer>

    <script>
        const API_BASE = 'http://localhost:3000';

        // Guard: must be logged in
        const user = JSON.parse(sessionStorage.getItem('user') || 'null');
        if (!user) window.location.href = '/login';

        function handleLogout() {
            sessionStorage.removeItem('user');
            window.location.href = '/login';
        }

        function previewImage(event) {
            const preview  = document.getElementById('imgPreview');
            const plus     = document.getElementById('uploadPlus');
            const file     = event.target.files[0];
            if (file) {
                preview.src          = URL.createObjectURL(file);
                preview.style.display = 'block';
                plus.style.display   = 'none';
            }
        }

        async function submitProduct() {
            const title       = document.getElementById('title').value.trim();
            const price       = document.getElementById('price').value.trim();
            const type        = document.getElementById('type').value;
            const productId   = document.getElementById('productId').value.trim();
            const status      = document.getElementById('status').value;
            const description = document.getElementById('description').value.trim();
            const imgFile     = document.getElementById('imgInput').files[0];
            const statusMsg   = document.getElementById('statusMsg');

            if (!title || !price || !type || !productId) {
                statusMsg.textContent = 'Please fill in all required fields.';
                statusMsg.style.color = 'red';
                statusMsg.style.display = 'block';
                return;
            }

            // Build multipart/form-data (required for image upload)
            const formData = new FormData();
            formData.append('ProductID',   productId);
            formData.append('name',        title);
            formData.append('type',        type);
            formData.append('price',       price);
            formData.append('description', description);
            formData.append('status',      status);
            formData.append('accountID',   user.AccountID);
            if (imgFile) formData.append('image', imgFile);

            statusMsg.textContent    = 'Saving...';
            statusMsg.style.color    = '#485935';
            statusMsg.style.display  = 'block';

            try {
                const res  = await fetch(`${API_BASE}/products`, { method: 'POST', body: formData });
                const data = await res.json();

                if (data.success) {
                    alert('Product added successfully!');
                    window.location.href = '/product-management';
                } else {
                    statusMsg.textContent = data.message || 'Failed to add product.';
                    statusMsg.style.color = 'red';
                }
            } catch (err) {
                statusMsg.textContent = 'Cannot connect to server. Please try again.';
                statusMsg.style.color = 'red';
            }
        }
    </script>
</body>
</html>
