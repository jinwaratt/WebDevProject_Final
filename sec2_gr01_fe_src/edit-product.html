<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Edit Product</title>
</head>
<body>
    <header><h1>ARAIMAIRU Solar Solution</h1></header>

    <nav>
        <ul>
            <li><a href="search.html">Search</a></li>
            <li><a href="login.html">Admin Logout</a></li>
        </ul>
    </nav>

    <main>
        <div class="admin-form-wrapper">
            <div class="edit-form-header">
                <h2 class="admin-form-title">Edit Product</h2>
                <button type="button" class="btn-delete" onclick="deleteProduct()">Delete</button>
            </div>

            <div class="admin-form-grid">
                <!-- Left: image upload + status + product ID -->
                <div class="admin-form-left">
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" name="status" class="admin-select">
                            <option value="1" selected>Available</option>
                            <option value="0">Unavailable</option>
                        </select>
                    </div>

                    <div class="img-upload-box" onclick="document.getElementById('imgInput').click()">
                        <span class="upload-plus" style="display:none;">+</span>
                        <img id="imgPreview" src="https://inwfile.com/s-dv/zjpzhp.jpg" alt="Product Image" style="width:100%; height:100%; object-fit:cover; border-radius:6px;">
                        <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="previewImage(event)">
                    </div>

                    <div class="form-group" style="margin-top: 12px;">
                        <label for="productId">ProductID</label>
                        <input type="text" id="productId" name="productId" value="P00002">
                    </div>
                </div>

                <!-- Right: title, price, type, description -->
                <div class="admin-form-right">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" value="Floating Solar Panel 550W">
                    </div>
                    <div class="form-group">
                        <label for="price">Price</label>
                        <input type="number" id="price" name="price" value="12900">
                    </div>
                    <div class="form-group">
                        <label for="type">Type</label>
                        <select id="type" name="type" class="admin-select">
                            <option value="Rooftop">Rooftop</option>
                            <option value="Floating" selected>Floating</option>
                            <option value="Ground">Ground</option>
                            <option value="Services">Services</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" rows="4">Bifacial monocrystalline panel that captures sunlight from both sides. Suitable for water surface installation. Efficiency 21.5%, wind-resistant aluminium frame, 25-year performance warranty.</textarea>
                    </div>

                    <div class="admin-form-actions">
                        <button type="button" class="btn-save" onclick="saveProduct()">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <h3>Contact us</h3>
        <section class="footer-content">
            <p>Email: ARAIMAIRUSolarSolution@gmail.com</p>
            <p>Tel: 099-999-9999</p>
        </section>
    </footer>

    <script>
        function previewImage(event) {
            const preview = document.getElementById('imgPreview');
            const plus = document.querySelector('.upload-plus');
            const file = event.target.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
                plus.style.display = 'none';
            }
        }

        function saveProduct() {
            const title = document.getElementById('title').value.trim();
            const price = document.getElementById('price').value.trim();
            if (!title || !price) {
                alert('Please fill in all required fields.');
                return;
            }
            alert('Product updated successfully!');
            window.location.href = 'product-management.html';
        }

        function deleteProduct() {
            if (confirm('Are you sure you want to delete this product?')) {
                alert('Product deleted.');
                window.location.href = 'product-management.html';
            }
        }
    </script>
</body>
</html>
